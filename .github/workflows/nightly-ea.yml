name: nightly-ea

on:
  workflow_dispatch:
  schedule:
    # Refresh EA tags every day at 04:00 UTC to track upstream EA builds.
    - cron: "0 4 * * *"

permissions:
  contents: read
  packages: write

concurrency:
  group: nightly-ea
  cancel-in-progress: true

jobs:
  build:
    name: "${{ matrix.tag }}"
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - tag: java_26_ea
            dir: java-26-ea
          - tag: java_26_ea_graalvm
            dir: java-26-ea-graalvm

    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: ./images/${{ matrix.dir }}/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          provenance: true
          sbom: true
          tags: ghcr.io/pterohost/pterodactyl-images:${{ matrix.tag }}
          cache-from: type=gha,scope=${{ matrix.tag }}
          cache-to: type=gha,mode=max,scope=${{ matrix.tag }}
          no-cache: true
